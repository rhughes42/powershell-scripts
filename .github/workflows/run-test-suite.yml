name: Run Test Suite

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  run-tests:
    name: Execute Test Scripts
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run sample test
        shell: pwsh
        run: |
          Write-Host "Running sample test..."
          cd tests
          & ./sample-test.ps1
          if ($LASTEXITCODE -eq 0 -or $null -eq $LASTEXITCODE) {
            Write-Host "✓ Sample test passed" -ForegroundColor Green
          } else {
            Write-Host "❌ Sample test failed" -ForegroundColor Red
            exit 1
          }

      - name: Run network test suite
        shell: pwsh
        run: |
          Write-Host "Running network test suite..."
          cd tests
          & ./test-network-suite.ps1
          if ($LASTEXITCODE -eq 0 -or $null -eq $LASTEXITCODE) {
            Write-Host "✓ Network test suite passed" -ForegroundColor Green
          }

      - name: Run HTTP endpoints test
        shell: pwsh
        run: |
          Write-Host "Running HTTP endpoints test..."
          cd tests
          & ./test-http-endpoints.ps1
          if ($LASTEXITCODE -eq 0 -or $null -eq $LASTEXITCODE) {
            Write-Host "✓ HTTP endpoints test passed" -ForegroundColor Green
          }

      - name: Run bandwidth monitor test
        shell: pwsh
        run: |
          Write-Host "Running bandwidth monitor test..."
          cd tests
          & ./test-bandwidth-monitor.ps1
          if ($LASTEXITCODE -eq 0 -or $null -eq $LASTEXITCODE) {
            Write-Host "✓ Bandwidth monitor test passed" -ForegroundColor Green
          }

      - name: Run system audit test
        shell: pwsh
        run: |
          Write-Host "Running system audit test..."
          cd tests
          & ./test-system-audit.ps1
          if ($LASTEXITCODE -eq 0 -or $null -eq $LASTEXITCODE) {
            Write-Host "✓ System audit test passed" -ForegroundColor Green
          }

      - name: Test summary
        if: always()
        shell: pwsh
        run: |
          Write-Host "`n========================================" -ForegroundColor Cyan
          Write-Host "Test Suite Execution Complete" -ForegroundColor Green
          Write-Host "========================================`n" -ForegroundColor Cyan
